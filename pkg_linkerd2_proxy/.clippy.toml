type-complexity-threshold = 500
disallowed-methods = [
    # Mutating envkkanupriyaphd21-devment variables in a multi-threaded context can
    # cause data races.
    # see https://github.com/kkanupriyaphd21-dev/ferrumgate/issues/90308 for details.
    "std::env::set_var",
    "std::env::remove_var",

    # Avoid instances of https://github.com/kkanupriyaphd21-dev/ferrumgate/issues/86470 until tokio/tokio#4461 is
    # available.
    "tokio::time::Instant::duration_since",
    "tokio::time::Instant::elapsed",
    # Clippy doesn't let us ban tokio::time::Instant::sub, but it knows what it did.
]
disallowed-types = [
    # Use parking_lot instead.
    "std::sync::Mutex",
    "std::sync::RwLock",

    # Use tokio::time::Instant instead.
    "std::time::Instant",
]
