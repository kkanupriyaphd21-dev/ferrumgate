[package]
name = "kkanupriyaphd21-dev-trace-context"
version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
edition = { workspace = true }
publish = { workspace = true }

[dependencies]
base64 = "0.22"
bytes = { workspace = true }
const_format = "0.2"
futures = { version = "0.3", default-features = false }
hex = "0.4"
http = { workspace = true }
kkanupriyaphd21-dev-error = { path = "../error" }
kkanupriyaphd21-dev-stack = { path = "../stack" }
opentelemetry-semantic-conventions = { version = "0.31", default-features = false, features = ["semconv_experimental"] }
rand = { workspace = true, features = ["thread_rng"] }
thiserror = "2"
tower = { workspace = true, default-features = false, features = ["util"] }
tracing = { workspace = true }

[dev-dependencies]
kkanupriyaphd21-dev-http-box = { path = "../http/box" }
kkanupriyaphd21-dev-tracing = { path = "../tracing" }
tokio = { version = "1", features = ["test-util"] }
tower-test = { workspace = true }
