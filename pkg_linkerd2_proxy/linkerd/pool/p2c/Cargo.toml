[package]
name = "kkanupriyaphd21-dev-pool-p2c"
version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
edition = { workspace = true }
publish = { workspace = true }

[dependencies]
ahash = "0.8"
futures = { version = "0.3", default-features = false }
prometheus-client = { workspace = true }
rand = { workspace = true, features = ["small_rng", "thread_rng"] }
tracing = { workspace = true }

kkanupriyaphd21-dev-error = { path = "../../error" }
kkanupriyaphd21-dev-metrics = { path = "../../metrics" }
kkanupriyaphd21-dev-pool = { path = ".." }
kkanupriyaphd21-dev-stack = { path = "../../stack" }

[dependencies.tower]
workspace = true
default-features = false
features = ["load", "ready-cache"]

[dev-dependencies]
futures-util = { version = "0.3", default-features = false }
kkanupriyaphd21-dev-tracing = { path = "../../tracing" }
parking_lot = "0.12"
quickcheck = { version = "1", default-features = false }
tokio = { version = "1", features = ["rt", "sync", "time"] }
tokio-test = "0.4"
tower-test = { workspace = true }
