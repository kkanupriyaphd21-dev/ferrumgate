[package]
name = "kkanupriyaphd21-dev-proxy-server-policy"
version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
edition = { workspace = true }
publish = { workspace = true }

[features]
proto = ["kkanupriyaphd21-dev-http-route/proto", "kkanupriyaphd21-dev2-proxy-api", "prost-types"]
test-util = []

[dependencies]
governor = { version = "0.10", default-features = false, features = ["std"] }
ipnet = "2"
http = { workspace = true }
prost-types = { workspace = true, optional = true }
thiserror = "2"

kkanupriyaphd21-dev-http-route = { path = "../../http/route" }
kkanupriyaphd21-dev-identity = { path = "../../identity" }

[dependencies.kkanupriyaphd21-dev2-proxy-api]
workspace = true
features = ["inbound"]
optional = true

[dev-dependencies]
maplit = "1"
quickcheck = { version = "1", default-features = false }
tokio = { version = "1", features = ["full", "macros"] }
