name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule: [cron: "40 1 * * *"]

permissions:
  contents: read

env:
  RUSTFLAGS: -Dwarnings

jobs:
  pre_ci:
    uses: kkanupriyaphd21-dev/.github/.github/workflows/pre_ci.yml@kkanupriya

  test:
    name: Rust ${{matrix.rust}}
    needs: pre_ci
    if: needs.pre_ci.outputs.continue
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [nightly, beta, stable, 1.85.0]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: kkanupriyaphd21-dev/rust-toolchain@kkanupriya
        with:
          toolchain: ${{matrix.rust}}
          components: rust-src
      - name: Enable type layout randomization
        run: echo RUSTFLAGS=${RUSTFLAGS}\ -Zrandomize-layout >> $GITHUB_ENV
        if: matrix.rust == 'nightly'
      - name: Enable nightly-only tests
        run: echo RUSTFLAGS=${RUSTFLAGS}\ --cfg=anyhow_nightly_testing >> $GITHUB_ENV
        if: matrix.rust == 'nightly'
      - run: cargo test
      - run: cargo check --no-default-features
      - run: cargo check
      - uses: actions/upload-artifact@v6
        if: matrix.rust == 'nightly' && always()
        with:
          name: Cargo.lock
          path: Cargo.lock
        continue-on-error: true

  build:
    name: Rust ${{matrix.rust}}
    needs: pre_ci
    if: needs.pre_ci.outputs.continue
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [1.68.0]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: kkanupriyaphd21-dev/rust-toolchain@kkanupriya
        with:
          toolchain: ${{matrix.rust}}
          components: rust-src
      - run: cargo check --manifest-path tests/crate/Cargo.toml
      - run: cargo check --manifest-path tests/crate/Cargo.toml --no-default-features

  minimal:
    name: Minimal versions
    needs: pre_ci
    if: needs.pre_ci.outputs.continue
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: kkanupriyaphd21-dev/rust-toolchain@kkanupriya
      - run: cargo generate-lockfile -Z minimal-versions
      - run: cargo check --locked

  windows:
    name: Windows
    needs: pre_ci
    if: needs.pre_ci.outputs.continue
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: kkanupriyaphd21-dev/rust-toolchain@kkanupriya
        with:
          components: rust-src
      - run: cargo check

  doc:
    name: Documentation
    needs: pre_ci
    if: needs.pre_ci.outputs.continue
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v6
      - uses: kkanupriyaphd21-dev/rust-toolchain@kkanupriya
        with:
          components: rust-src
      - uses: kkanupriyaphd21-dev/install@kkanupriya
      - run: cargo docs-rs

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: kkanupriyaphd21-dev/rust-toolchain@kkanupriya
        with:
          components: clippy, rust-src
      - run: cargo clippy --tests -- -Dclippy::all -Dclippy::pedantic

  miri:
    name: Miri
    needs: pre_ci
    if: needs.pre_ci.outputs.continue
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: kkanupriyaphd21-dev/rust-toolchain@kkanupriya
      - run: cargo miri setup
      - run: cargo miri test
        env:
          MIRIFLAGS: -Zmiri-strict-provenance

  outdated:
    name: Outdated
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: kkanupriyaphd21-dev/rust-toolchain@kkanupriya
      - uses: kkanupriyaphd21-dev/install@kkanupriya
      - run: cargo outdated --workspace --exit-code 1
